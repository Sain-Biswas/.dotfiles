# Global Configs
[config]
version_check = true

# Templates

# Bat
[templates.bat]
input_path = '~/.dotfiles/.config/matugen/templates/matugen-bat.tmTheme'
output_path = '~/.dotfiles/.config/bat/themes/matugen.tmTheme'
post_hook = 'bat cache --build'

# Spicetify
[templates.spicetify]
input_path = '~/.dotfiles/.config/matugen/templates/matugen-spicetify.ini'
output_path = '~/.dotfiles/.config/spicetify/Themes/Matugen/color.ini'
post_hook = 'spicetify apply'

# Rofi
[templates.rofi]
input_path = '~/.dotfiles/.config/matugen/templates/matugen-rofi.rasi'
output_path = '~/.dotfiles/.config/rofi/colors.rasi'

# Hyprland
# [templates.hyprland]
# input_path = '~/.config/matugen/templates/matugen-hyprland.conf'
# output_path = '~/.config/hypr/matugen/matugen-hyprland.conf'

# Hyprlock
# [templates.hyprlock]
# input_path = '~/.config/matugen/templates/matugen-hyprlock.conf'
# output_path = '~/.config/hypr/hyprlock/matugen/matugen-hyprlock.conf'

# Waybar
[templates.waybar]
input_path = '~/.dotfiles/.config/matugen/templates/matugen-waybar.css'
output_path = '~/.dotfiles/.config/waybar/colors.css'
post_hook = 'pkill -SIGUSR2 waybar'

# Swaync
[templates.swaync]
input_path = '~/.config/matugen/templates/matugen-swaync.css'
output_path = '~/.dotfiles/.config/swaync/colors.css'
post_hook = 'swaync-client -rs'


# Gtk3
[templates.gtk3]
input_path = '~/.dotfiles/.config/matugen/templates/matugen-gtk.css'
output_path = '~/.dotfiles/.config/gtk-3.0/gtk.css'

# GTk4
[templates.gtk4]
input_path = '~/.dotfiles/.config/matugen/templates/matugen-gtk.css'
output_path = '~/.dotfiles/.config/gtk-4.0/gtk.css'

# Qt5
[templates.qt5]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen-qt5ct.conf'

# Qt6
[templates.qt6]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen-qt6ct.conf'

# Kvantum
[templates.kvantum]
input_path = '~/.config/matugen/templates/matugen-kvantum.kvconfig'
output_path = '~/.config/Kvantum/matugen/matugen.kvconfig'

# Btop
[templates.btop]
input_path = '~/.dotfiles/.config/matugen/templates/matugen-btop.theme'
output_path = '~/.dotfiles/.config/btop/themes/matugen.theme'

# Neovim & Nvchad
# [templates.neovim-nvchad]
# input_path = '~/.config/matugen/templates/matugen-nvchad.lua'
# output_path = '~/.cache/wal/base46-dark.lua'

# [templates.neovim-nvchad-colors]
# input_path = '~/.config/matugen/templates/matugen-nvchad-colors'
# output_path = '~/.cache/wal/colors'

# Pywalfox
[templates.pywalfox]
input_path = '~/.dotfiles/.config/matugen/templates/matugen-pywalfox.json'
output_path = '~/.cache/wal/colors.json'
post_hook = 'pywalfox update'

#Zsh
[templates.zsh]
input_path = '~/.dotfiles/.config/matugen/templates/matugen-zsh.zsh'
output_path = '~/.dotfiles/matugen.zsh'
