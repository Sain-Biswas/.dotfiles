[colors.primary]
background = '{{colors.background.dark.hex}}'
foreground = '{{colors.on_surface.dark.hex}}'

[colors.cursor]
text = '{{colors.on_surface.dark.hex}}'
cursor = '{{colors.on_surface_variant.dark.hex}}'

[colors.vi_mode_cursor]
text = '{{colors.background.dark.hex}}'
cursor = '{{colors.primary.dark.hex}}'

[colors.search.matches]
foreground = '{{colors.surface_variant.dark.hex}}'
background = '{{colors.tertiary.dark.hex}}'

[colors.search.focused_match]
foreground = '{{colors.surface_variant.dark.hex}}'
background = '{{colors.primary.dark.hex}}'

[colors.footer_bar]
foreground = '{{colors.surface_variant.dark.hex}}'
background = '{{colors.inverse_surface.dark.hex}}'

[colors.hints.start]
foreground = '{{colors.surface_variant.dark.hex}}'
background = '{{colors.secondary.dark.hex}}'

[colors.hints.end]
foreground = '{{colors.surface_variant.dark.hex}}'
background = '{{colors.secondary.dark.hex}}'

[colors.selection]
text = '{{colors.background.dark.hex}}'
background = '{{colors.primary.dark.hex}}'


[colors.normal]
black = "{{colors.surface_variant.dark.hex}}"
red = "{{colors.error.dark.hex}}"
green = "{{colors.primary.dark.hex}}"
yellow = "{{colors.secondary.dark.hex}}"
blue = "{{colors.tertiary.dark.hex}}"
magenta = "{{colors.primary_fixed_dim.dark.hex}}"
cyan = "{{colors.secondary_fixed_dim.dark.hex}}"
white = "{{colors.on_surface.dark.hex}}"


[colors.bright]
black = "{{colors.on_surface_variant.dark.hex}}"
red = "{{colors.error.dark.hex}}"
green = "{{colors.primary.dark.hex}}"
yellow = "{{colors.secondary.dark.hex}}"
blue = "{{colors.tertiary.dark.hex}}"
magenta = "{{colors.primary_fixed_dim.dark.hex}}"
cyan = "{{colors.secondary_fixed_dim.dark.hex}}"
white = "{{colors.on_surface.dark.hex}}"
