[os]
disabled = false
format = "[$symbol]($style)"
style = "tertiaryfixeddim bold"

[os.symbols]
Windows = "َ°چ²"
Macos = " îœ‘"
Linux = "َ°Œ½"
Android = "َ°€²"
Arch = "îœ²"

[directory]
disabled = false
style = "surfacetint bold"
format = "[ $path ]($style)"
truncation_length = 4

[directory.substitutions]
'/mnt/shared' = '@shared'

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="ïگˆ "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="ïٹ– "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="ï…± "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="َ°ٹ¢ "
else
    GIT_REMOTE_SYMBOL="ï‡’ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "on $output"
require_repo = true
ignore_timeout = true

[git_branch]
disabled = false
symbol = "[î‚¶](onprimary)ïگک "
style = "fg:primary bg:onprimary"
format =  "  at [$symbol$branch]($style)[î‚´](onprimary)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "َ°¾‹ "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold tertiary"
require_repo = true
ignore_timeout = true

[git_status]
disabled = false
format = " [$untracked$staged$modified$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged     = " [+${count}](bold primary)"
modified   = " [!${count}](bold secondary)"
renamed    = " [آ»${count}](bold tertiary)"
deleted    = " [-${count}](bold error)"
untracked  = " [?${count}](bold secondary)"
stashed    = " [â‰،${count}](bold errorcontainer)"
conflicted = " [âœک${count}](bold error bold)"

ahead      = " [â‡،${count}](bold primary)"
behind     = " [â‡£${count}](bold secondary)"
diverged   = " [â‡•â‡،${ahead_count}â‡£${behind_count}](bold error)"


[git_metrics]
disabled = false
added_style = 'bold primary'
deleted_style = "bold error"
format = ' [+$added]($added_style) [-$deleted]($deleted_style)'


