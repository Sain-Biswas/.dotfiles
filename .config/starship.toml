"$schema" = 'https://starship.rs/config-schema.json'
scan_timeout = 100
command_timeout = 500
follow_symlinks = false

format = """
$os\
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$git_metrics\
$fill\
$git_state\
$package\
$bun\
$deno\
$rust\
$golang\
$lua\
$c\
$cpp\
$gleam\
$docker_context\
$sudo\
$cmd_duration\
$line_break\
$username\
$character\
"""

palette = "matugen"
continuation_prompt = "[â–¸â–¹ ](primary)"

[fill]
symbol = ' '

